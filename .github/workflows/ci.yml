name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Cross-vet
        run: GOOS=windows go vet ./internal/memd/...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: go build ./cmd/splice

      - name: Cross-build
        run: |
          GOOS=windows GOARCH=amd64 go build ./cmd/splice
          GOOS=linux GOARCH=amd64 go build ./cmd/splice

  memd:
    name: memd sidecar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: memd/go.mod
          cache: true
          cache-dependency-path: memd/go.sum

      - name: Vet
        working-directory: memd
        run: go vet ./...

      - name: Test
        working-directory: memd
        run: go test -race ./...

      - name: Build
        working-directory: memd
        run: go build -o splice-memd .
