name: Release Please

on:
  push:
    branches:
      - main

# Release Please opens and keeps a release PR up to date from conventional
# commits. Merging that PR cuts a GitHub Release with an auto-generated
# changelog and tag. Binary publishing (cross-compile + checksum + upload) is
# handled by release-artifacts.yml, which triggers on release creation.
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: go
          manifest-file: .release-please-manifest.json
          include-component-in-tag: false
          # release-as overrides the computed version for ONE release. v0.1.2 is
          # a security/hardening bundle shipped as a patch (the feat: commit
          # would otherwise bump to 0.2.0 under bump-minor-pre-major). Remove
          # this line after v0.1.2 is cut so normal semver resumes.
          release-as: 0.1.2
          # Keep 0.x versioning: features bump minor (not major) below 1.0.0.
          bump-minor-pre-major: true
          prerelease: false
